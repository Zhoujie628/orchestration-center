# ============================================================
# Basic Settings
# ============================================================

# Listening IP address. 127.0.0.1 = localhost only (recommended for
# production behind Nginx); 0.0.0.0 = accept from all interfaces.
ip=127.0.0.1

# Listening port.
port=5001

# ============================================================
# HTTPS / TLS
# ============================================================

# Enable HTTPS for the backend server.
# Set to false for development (HTTP); set to true for production.
enable_https=false

# Server certificate (presented to clients to prove identity).
ssl_certfile=etc/ssl/server.cer

# Server private key (must be kept secret, used to complete TLS handshake).
ssl_keyfile=etc/ssl/server_key.pem

# Password file for the encrypted private key.
ssl_keyfile_password=etc/ssl/cert_pwd

# CA trust store (used to verify certificates presented by other parties).
ssl_ca_certs=etc/ssl/trust.cer

# Certificate Revocation List (CRL) file path (optional).
#ssl_crl_file=etc/ssl/revocationlist.crl

# ============================================================
# Mutual TLS Authentication
# ============================================================

# Whether to require client certificates when others connect to this server.
# false = single-direction TLS (anyone can connect, auth at app layer).
# true  = mutual TLS (clients must present a certificate signed by ssl_ca_certs).
verify_client=false

# Whether to verify remote server certificates when this service connects
# outward (e.g., to the registry center or A2A agents).
# false = skip verification (allows self-signed certs, for development).
# true  = enforce verification (requires proper CA trust store in production).
client_verify_server=false

# ============================================================
# Access Authentication
# ============================================================

# SHA-256 hash of the frontend login password.
# Leave empty to disable login authentication (backward compatible).
# Generate the hash: python generate_access_password.py
access_password=

# Session token lifetime in seconds (default: 43200 = 12 hours).
access_token_ttl=43200

# ============================================================
# Persistence
# ============================================================

# Persistence mode: file (JSON files) / postgresql (PostgreSQL database).
persistence_mode=file

# ============================================================
# Network
# ============================================================

# Registry Center URL.
agent_registry_url=https://127.0.0.1:5000

# Trusted X-Forwarded-For IP addresses (comma-separated).
forwarded_allow_ips="127.0.0.1"
